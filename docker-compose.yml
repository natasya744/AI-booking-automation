version: '3.3'
 
services:
  n8n:
    image: n8nio/n8n:2.10.2

    container_name: n8n
    restart: always
    environment:
      - N8N_HOST=n8n.konsultankuai.site
      - N8N_PORT=5678
      - N8N_PROTOCOL=https
      - NODE_ENV=production
      - WEBHOOK_URL=https://n8n.konsultankuai.site/
      - GENERIC_TIMEZONE=Asia/Jakarta
      - N8N_BASIC_AUTH_ACTIVE=true
      - N8N_BASIC_AUTH_USER=admin
      - N8N_BASIC_AUTH_PASSWORD=Tasya162331..,,
      - N8N_MFA_ENABLED=false

    
    volumes:
      - n8n_data:/home/node/.n8n
    networks:
      - proxy_public
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.n8n.rule=Host(`n8n.konsultankuai.site`)"
      - "traefik.http.routers.n8n.entrypoints=websecure"
      - "traefik.http.routers.n8n.tls.certresolver=myresolver"
      - "traefik.http.services.n8n.loadbalancer.server.port=5678"
 
volumes:
  n8n_data:
 
networks:
  proxy_public:
    external: true
